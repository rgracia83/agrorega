<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5132" />
  <title>AgroRega Manager</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="assets/styles.css?v=stock2noname" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="brand-mark">AR</div>
      <p class="eyebrow">AgroRega Manager</p>
      <h1>Gestão completa para empresas de instalação de rega</h1>
      <p class="muted">Demonstração webapp com clientes, projetos, orçamentos, stock, vendas, compras e administração.</p>
      <form id="loginForm" class="login-form">
        <label>Utilizador
          <input id="loginUser" type="text" autocomplete="username" value="admin" required />
        </label>
        <label>Palavra-passe
          <input id="loginPass" type="password" autocomplete="current-password" value="admin123" required />
        </label>
        <button type="submit" class="btn btn-primary">Entrar no painel</button>
        <p id="loginError" class="form-error" hidden>Credenciais inválidas.</p>
      </form>
      <div class="demo-credentials">
        <span>Demo:</span> admin / admin123
      </div>
    </div>
    <div class="login-preview" aria-hidden="true">
      <div class="preview-card tall"></div>
      <div class="preview-card"></div>
      <div class="preview-card wide"></div>
    </div>
  </div>

  <div id="appShell" class="app-shell" hidden>
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="brand-mark small">AR</div>
        <div>
          <strong>AgroRega</strong>
          <span>Admin Console</span>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-foot">
        <div class="user-pill">
          <span class="avatar">AD</span>
          <div>
            <strong>Administrador</strong>
            <span>Administrador</span>
          </div>
        </div>
        <button id="logoutBtn" class="btn btn-ghost full">Terminar sessão</button>
      </div>
    </aside>

    <div id="overlay" class="overlay" hidden></div>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn mobile-only" aria-label="Abrir menu">☰</button>
        <div>
          <p id="pageEyebrow" class="eyebrow">Painel</p>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="topbar-actions">
          <button id="quickAddBtn" class="btn btn-primary compact">+ Novo</button>
          <button id="exportBtn" class="btn btn-outline compact">Exportar</button>
        </div>
      </header>

      <section id="pageContent" class="page-content"></section>
    </main>

    <nav id="bottomNav" class="bottom-nav mobile-only"></nav>
  </div>

  <div id="modalRoot" class="modal-root" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script src="assets/app.js?v=stock2noname"></script>
</body>
</html>
